schema: spec-driven

context: |
  Project type: Personal-use TTRPG character sheet webapp
  Tech stack: Next.js, React, TypeScript, Tailwind CSS
  Routing: Next.js App Router
  Persistence: Browser localStorage with JSON export/import
  Deployment target: Local development first; optional Docker deployment later
  Authentication: None
  Database: None
  Scope: Single-user, single ruleset MVP
  Priorities: Simplicity, fast delivery in one week, clear maintainable structure
  Code organization: Keep rules data separate from UI and keep derived stat calculations in pure utility functions
  Style: Prefer simple components and minimal dependencies

rules:
  proposal:
    - Keep MVP scope narrow and realistic for a one-week build
    - Exclude auth, multiplayer, external database, and public hosting unless explicitly requested
  design:
    - Favor local-first browser persistence over server-side storage
    - Keep calculation logic separate from presentation components
  tasks:
    - Break work into small, sequential tasks that can be completed during a one-week project
